<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Churn Predictor</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 60px auto; padding: 0 20px; color: #222; }
    h1 { font-size: 20px; margin-bottom: 24px; }
    label { display: block; font-size: 13px; margin-bottom: 4px; color: #555; }
    input, select { width: 100%; padding: 8px 10px; margin-bottom: 14px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; }
    button { width: 100%; padding: 10px; background: #1a1a2e; color: #fff; border: none; border-radius: 4px; font-size: 15px; cursor: pointer; }
    button:hover { background: #2d3a5e; }
    .result { margin-top: 24px; padding: 16px; border-radius: 6px; background: #f0f4ff; border-left: 4px solid #3b82f6; }
    .result.churn { background: #fff0f0; border-color: #ef4444; }
    .result strong { font-size: 18px; }
    .result p { font-size: 13px; color: #555; margin-top: 6px; }
    .error { margin-top: 16px; color: #b91c1c; font-size: 14px; }
  </style>
</head>
<body>

  <h1>Churn Predictor</h1>

  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/predict">
    <label>Frequency (orders)</label>
    <input type="number" name="Frequency" value="{{ form.Frequency if form else '' }}" required />

    <label>Monetary Total (£)</label>
    <input type="number" step="0.01" name="MonetaryTotal" value="{{ form.MonetaryTotal if form else '' }}" required />

    <label>Monetary Avg (£)</label>
    <input type="number" step="0.01" name="MonetaryAvg" value="{{ form.MonetaryAvg if form else '' }}" />

    <label>Customer Tenure (days)</label>
    <input type="number" name="CustomerTenure" value="{{ form.CustomerTenure if form else '' }}" />

    <label>Unique Products</label>
    <input type="number" name="UniqueProducts" value="{{ form.UniqueProducts if form else '' }}" />

    <label>Age</label>
    <input type="number" name="Age" value="{{ form.Age if form else '' }}" />

    <label>Gender</label>
    <select name="Gender">
      <option value="M">Male</option>
      <option value="F">Female</option>
      <option value="Unknown">Unknown</option>
    </select>

    <label>Region</label>
    <select name="Region">
      {% for r in ['UK','Europe-N','Europe-S','Europe-E','Europe-C','Asia','Other'] %}
      <option value="{{ r }}">{{ r }}</option>
      {% endfor %}
    </select>

    <button type="submit">Predict</button>
  </form>

  {% if result %}
  <div class="result {% if result.prediction == 1 %}churn{% endif %}">
    <strong>{{ result.label }}</strong>
    <p>Churn probability: {{ result.probability }}% &nbsp;|&nbsp; Risk: {{ result.risk }}</p>
  </div>
  {% endif %}

</body>
</html>
